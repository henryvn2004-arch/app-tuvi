<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lá Số Tử Vi — Tử Vi Minh Bảo</title>
<meta name="description" content="Luận giải lá số Tử Vi Đẩu Số — Tử Vi Minh Bảo">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,600;1,400&family=Noto+Serif+SC:wght@400;600&family=Be+Vietnam+Pro:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --navy: #061A2E; --blue: #1455A4; --gold: #9A7B3A; --gold-lt: #F9F4EB;
  --text: #1a1a1a; --text-mid: #444; --text-lt: #777;
  --border: #CCCCCC; --bg: #FFFFFF; --bg-soft: #F5F4F0;
}
body { font-family: 'Be Vietnam Pro', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }

.topnav { position: sticky; top: 0; z-index: 200; background: var(--navy); display: flex; align-items: center; height: 60px; padding: 0 40px; gap: 32px; }
.nav-logo { font-family: 'Noto Serif SC', serif; font-size: 17px; color: #fff; flex: 1; text-decoration: none; }
.nav-logo em { font-style: italic; color: #8BAACC; font-size: 14px; margin-left: 8px; font-family: 'Noto Serif', serif; }
.nav-links { display: flex; align-items: center; gap: 4px; }
.nav-link { color: #8BAACC; font-size: 13px; text-decoration: none; padding: 6px 12px; border-radius: 6px; transition: all 0.15s; }
.nav-link:hover { color: #fff; background: rgba(255,255,255,0.07); }

/* Loading */
.loading-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; padding: 80px 20px; }
.loading-spinner { width: 36px; height: 36px; border: 3px solid #e0e0e0; border-top-color: var(--navy); border-radius: 50%; animation: spin 0.8s linear infinite; }
.loading-text { font-size: 14px; color: var(--text-lt); }
@keyframes spin { to { transform: rotate(360deg); } }

/* Error */
.error-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; padding: 80px 20px; text-align: center; }
.error-icon { font-size: 48px; }
.error-title { font-family: 'Noto Serif', serif; font-size: 22px; color: var(--navy); }
.error-sub { font-size: 14px; color: var(--text-lt); }

/* Hero */
.hero { background: var(--navy); padding: 52px 40px 40px; }
.hero-eyebrow { font-size: 10px; letter-spacing: 3px; color: #c9a84c; text-transform: uppercase; margin-bottom: 10px; }
.hero-title { font-family: 'Noto Serif', serif; font-size: 32px; color: #fff; font-weight: 400; margin-bottom: 6px; }
.hero-sub { font-size: 14px; color: #8BAACC; font-weight: 300; }

/* Info bar */
.info-bar {
  background: var(--bg-soft);
  border-bottom: 1px solid var(--border);
  padding: 16px 40px;
  display: flex; flex-wrap: wrap; gap: 24px;
}
.info-item { display: flex; flex-direction: column; gap: 2px; }
.info-label { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-lt); }
.info-value { font-size: 14px; color: var(--navy); font-weight: 500; }

/* Content */
.content { flex: 1; max-width: 800px; margin: 0 auto; padding: 48px 40px 80px; width: 100%; }

/* Sections */
.section { margin-bottom: 48px; }
.section-num { font-size: 10px; letter-spacing: 2px; color: var(--gold); text-transform: uppercase; margin-bottom: 6px; }
.section-title { font-family: 'Noto Serif', serif; font-size: 20px; color: var(--navy); margin-bottom: 16px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
.section-body { font-size: 15px; line-height: 1.9; color: var(--text-mid); font-weight: 300; }
.section-body p + p { margin-top: 12px; }

/* Quote block for notable lines */
.luan-giai-text h2, .luan-giai-text h3 { font-family: 'Noto Serif', serif; color: var(--navy); margin: 20px 0 8px; font-size: 16px; }
.luan-giai-text p { margin-bottom: 10px; font-size: 14px; line-height: 1.85; color: var(--text-mid); font-weight: 300; }
.luan-giai-text strong { color: var(--text); font-weight: 500; }
.luan-giai-text em { color: var(--gold); }

/* CTA */
.cta-box { background: var(--navy); border-radius: 12px; padding: 28px 32px; display: flex; align-items: center; justify-content: space-between; gap: 20px; margin-top: 48px; flex-wrap: wrap; }
.cta-text { color: #8BAACC; font-size: 14px; line-height: 1.6; font-weight: 300; }
.cta-text b { color: #fff; }
.cta-btn { padding: 12px 24px; background: #c9a84c; color: #061A2E; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; text-decoration: none; white-space: nowrap; transition: background 0.15s; font-family: inherit; }
.cta-btn:hover { background: #f0d080; }

.footer { background: var(--navy); padding: 20px 40px; display: flex; justify-content: space-between; font-size: 12px; color: #4a6080; }

@media (max-width: 700px) {
  .topnav { padding: 0 16px; }
  .hero { padding: 40px 20px 32px; }
  .info-bar { padding: 14px 20px; gap: 16px; }
  .content { padding: 32px 20px 60px; }
  .cta-box { flex-direction: column; }
  .footer { flex-direction: column; gap: 4px; }
}
</style>
</head>
<body>

<nav class="topnav">
  <a class="nav-logo" href="/">紫微明寶 <em>Tử Vi Minh Bảo</em></a>
  <div class="nav-links">
    <a class="nav-link" href="/">Trang Chủ</a>
    <a class="nav-link" href="/menh-kho.html">Mệnh Khố</a>
    <a class="nav-link" href="/about.html">Giới Thiệu</a>
  </div>
</nav>

<div id="loading-state" class="loading-wrap">
  <div class="loading-spinner"></div>
  <div class="loading-text">Đang tải lá số...</div>
</div>

<div id="error-state" class="error-wrap" style="display:none">
  <div class="error-icon">☁</div>
  <div class="error-title">Không tìm thấy lá số</div>
  <div class="error-sub">Lá số này không tồn tại hoặc đã bị xóa.</div>
</div>

<div id="main-content" style="display:none; flex:1; flex-direction:column">
  <div class="hero">
    <div class="hero-eyebrow">Lá Số Tử Vi Đẩu Số</div>
    <div class="hero-title" id="hero-title">—</div>
    <div class="hero-sub" id="hero-sub">—</div>
  </div>

  <div class="info-bar" id="info-bar"></div>

  <div class="content" id="content-sections"></div>
</div>

<div class="footer">
  <span>紫微明寶 · Tử Vi Minh Bảo</span>
  <span>紫微斗數 · Tri Mệnh Lý · Thuận Thế Hành</span>
</div>

<script>
const PHAN_LABELS = [
  '', 'Tổng Quan Lá Số',
  'Cung Mệnh','Cung Phụ Mẫu','Cung Phúc Đức','Cung Điền Trạch',
  'Cung Quan Lộc','Cung Nô Bộc','Cung Thiên Di','Cung Tật Ách',
  'Cung Tài Bạch','Cung Tử Tức','Cung Phu Thê','Cung Huynh Đệ',
  'Tổng Quan Đại Vận',
  'Đại Vận 1','Đại Vận 2','Đại Vận 3','Đại Vận 4','Đại Vận 5',
  'Đại Vận 6','Đại Vận 7','Đại Vận 8','Đại Vận 9',
  'Tiểu Vận Năm Xem',
];

function renderMarkdown(text) {
  if (!text) return '';
  return text
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/\n\n/g, '</p><p>')
    .replace(/^/, '<p>').replace(/$/, '</p>');
}

async function loadLaSo() {
  const params = new URLSearchParams(window.location.search);
  const slug = params.get('slug');
  if (!slug) { showError(); return; }

  try {
    const res = await fetch(`/api/get-laso?slug=${encodeURIComponent(slug)}`);
    if (!res.ok) { showError(); return; }
    const data = await res.json();
    render(data);
  } catch (e) {
    showError();
  }
}

function showError() {
  document.getElementById('loading-state').style.display = 'none';
  document.getElementById('error-state').style.display = 'flex';
}

function render(d) {
  document.getElementById('loading-state').style.display = 'none';
  const main = document.getElementById('main-content');
  main.style.display = 'flex';

  // SEO title
  const gt = d.gioi_tinh === 'nu' ? 'Nữ mệnh' : 'Nam mệnh';
  const titleStr = `${d.can_chi_nam} · ${gt} · ${d.nam_sinh}`;
  document.title = `Lá Số ${titleStr} — Tử Vi Minh Bảo`;

  // Hero
  document.getElementById('hero-title').textContent = `Lá Số ${d.can_chi_nam}`;
  document.getElementById('hero-sub').textContent =
    `${gt} · Năm sinh ${d.nam_sinh}${d.gio_chi ? ' · Giờ ' + d.gio_chi : ''}`;

  // Info bar
  const infos = [
    { label: 'Can Chi Năm', value: d.can_chi_nam },
    { label: 'Bản mệnh', value: d.nap_am || '—' },
    { label: 'Cung Mệnh', value: d.cung_menh || '—' },
    { label: 'Chính Tinh', value: d.chinh_tinh || '—' },
    { label: 'Cục', value: d.cuc || '—' },
    { label: 'Giới tính', value: d.gioi_tinh === 'nu' ? 'Nữ' : 'Nam' },
  ];
  document.getElementById('info-bar').innerHTML = infos.map(i =>
    `<div class="info-item"><div class="info-label">${i.label}</div><div class="info-value">${i.value}</div></div>`
  ).join('');

  // Sections — render available phần
  const luan = d.luan_giai || {};
  const container = document.getElementById('content-sections');
  const phanKeys = Object.keys(luan).map(Number).sort((a,b) => a-b);

  if (phanKeys.length === 0) {
    container.innerHTML = '<p style="color:#aaa;font-size:14px">Chưa có luận giải.</p>';
  } else {
    container.innerHTML = phanKeys.map(n => `
      <div class="section">
        <div class="section-num">Phần ${n} / 24</div>
        <div class="section-title">${PHAN_LABELS[n] || 'Luận giải'}</div>
        <div class="section-body luan-giai-text">${renderMarkdown(luan[n])}</div>
      </div>
    `).join('');
  }

  // CTA
  container.innerHTML += `
    <div class="cta-box">
      <div class="cta-text">
        <b>Muốn xem lá số của bạn?</b><br>
        An sao Tử Vi Đẩu Số theo cổ pháp, luận giải bằng trí tuệ nhân tạo.
      </div>
      <a class="cta-btn" href="/">Xem lá số của tôi →</a>
    </div>`;
}

loadLaSo();
</script>
</body>
</html>
