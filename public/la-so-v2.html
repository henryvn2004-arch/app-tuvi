<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lá Số Tử Vi — Tử Vi Minh Bảo</title>
<link rel="icon" type="image/webp" href="/seal.webp">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;600;700&family=Be+Vietnam+Pro:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#061A2E;--navy-mid:#0D3B5E;--blue:#1455A4;
  --gold:#9A7B3A;--gold-lt:#F9F4EB;
  --text:#1a1a1a;--text-mid:#444;--text-lt:#777;
  --border:#CCCCCC;--border-lt:#E8E8E8;
  --bg:#FFFFFF;--bg-soft:#F5F4F0;
  --red:#C0392B;--green:#1E6B3C;
}
body{font-family:'Be Vietnam Pro',sans-serif;background:var(--bg-soft);color:var(--text);min-height:100vh}

/* ── NAV ── */
.topnav{position:sticky;top:0;z-index:200;background:var(--navy);display:flex;align-items:center;height:56px;padding:0 32px;gap:24px}
.nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.nav-logo img{width:34px;height:34px;object-fit:contain;border-radius:4px}
.nav-logo .name{font-size:15px;font-weight:700;color:#CC2200;font-family:Georgia,serif}
.nav-links{display:flex;gap:2px}
.nav-link{color:#8BAACC;font-size:13px;text-decoration:none;padding:5px 10px;border-radius:5px;transition:.15s}
.nav-link:hover{color:#fff;background:rgba(255,255,255,.07)}

/* ── FORM ── */
.form-wrap{max-width:860px;margin:28px auto 0;padding:0 16px}
.form-card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:24px 28px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.form-title{font-family:'Noto Serif',serif;font-size:18px;color:var(--navy);font-weight:600;margin-bottom:20px}
.form-row{display:flex;gap:12px;margin-bottom:14px;flex-wrap:wrap;align-items:flex-end}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-group label{font-size:11px;font-weight:600;color:var(--text-lt);letter-spacing:.5px;text-transform:uppercase}
.form-group input,.form-group select{
  border:1px solid var(--border);border-radius:6px;padding:8px 10px;
  font-size:13px;font-family:inherit;color:var(--text);background:#fff;
  outline:none;transition:.15s;
}
.form-group input:focus,.form-group select:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(20,85,164,.1)}
.fg-name{flex:2;min-width:180px}
.fg-gender{width:90px}
.fg-dd,.fg-mm{width:70px}
.fg-yyyy{width:90px}
.fg-hh,.fg-pp{width:70px}
.fg-namxem{width:90px}
.btn-anlaso{
  background:var(--blue);color:#fff;border:none;border-radius:6px;
  padding:9px 22px;font-size:13px;font-weight:600;font-family:inherit;
  cursor:pointer;transition:.15s;white-space:nowrap;align-self:flex-end;
}
.btn-anlaso:hover{background:#0f3f87}
.btn-anlaso:disabled{opacity:.6;cursor:not-allowed}
.gio-info{font-size:12px;color:var(--text-lt);align-self:center;padding-bottom:4px}

/* ── GRID WRAPPER ── */
.grid-wrap{max-width:960px;margin:24px auto 40px;padding:0 16px}
.grid-section-title{font-size:12px;font-weight:600;color:var(--text-lt);letter-spacing:2px;text-transform:uppercase;margin-bottom:12px}

/* ── LASO GRID ── */
.laso-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  grid-template-rows:repeat(4,auto);
  border:2px solid #333;
  background:#fff;
  font-family:'Be Vietnam Pro',sans-serif;
}
.cung-cell{
  border:1px solid #888;
  padding:7px 7px 5px;
  min-height:160px;
  position:relative;
  display:flex;flex-direction:column;
  background:#fff;
  overflow:hidden;
}
.cung-cell:hover{background:#FFFDF7}

/* center 2×2 merged cell */
.cell-center{
  grid-column:2/4;grid-row:2/4;
  border:1px solid #888;
  padding:16px 20px;
  display:flex;flex-direction:column;justify-content:center;
  background:#fff;
}

/* ── CELL HEADER ── */
.cell-header{
  display:flex;flex-direction:column;align-items:center;
  margin-bottom:5px;gap:2px;
}
.can-chi-label{font-size:9px;color:#777;font-weight:500;letter-spacing:.3px;text-transform:uppercase;width:100%;text-align:left}
.cung-name-label{font-size:10px;color:#222;font-weight:700;text-transform:uppercase;text-align:center;width:100%;letter-spacing:.5px}

/* ── BADGES ── */
.badge-menh,.badge-than{
  display:inline-block;padding:1px 6px;font-size:9px;font-weight:700;
  letter-spacing:1px;text-transform:uppercase;border-radius:2px;margin-bottom:4px;
}
.badge-menh{border:1.5px solid var(--blue);color:var(--blue)}
.badge-than{border:1.5px solid #7B3FA0;color:#7B3FA0}

/* ── CHINH TINH ── */
.chinh-tinh-area{margin-bottom:5px}
.chinh-tinh-item{
  font-family:'Noto Serif',serif;font-size:12.5px;font-weight:700;
  line-height:1.4;letter-spacing:.2px;
}
.star-brightness{font-size:10px;font-weight:600;opacity:.9}
.star-hoa{font-size:10px;font-weight:700;margin-left:3px;opacity:.95}

/* ── PHU TINH ── */
.phu-tinh-area{
  flex:1;display:grid;grid-template-columns:1fr 1fr;
  gap:1px 4px;align-content:start;
}
.phu-tinh-item{font-size:9.5px;line-height:1.45;font-weight:500}

/* ── CELL FOOTER ── */
.cell-footer{
  display:flex;justify-content:space-between;align-items:flex-end;
  margin-top:5px;border-top:1px solid #ddd;padding-top:3px;
}
.trang-sinh-label{font-size:9px;color:#777;font-weight:500;text-transform:uppercase;letter-spacing:.5px}
.dai-van-num{font-size:10px;color:#333;font-weight:700}

/* ── INNER LABEL (tiểu vận tuổi) ── */

/* ── TUAN TRIET tags ── */
.tuan-tag,.triet-tag{
  display:inline-block;padding:0 5px;font-size:8px;font-weight:700;
  letter-spacing:1px;border-radius:2px;text-transform:uppercase;
  position:absolute;bottom:-1px;left:50%;transform:translateX(-50%);
  z-index:5;
}
.tuan-tag{background:#2c4a00;color:#fff}
.triet-tag{background:#4a0000;color:#fff}

/* ── CENTER INFO ── */
.center-name{font-family:'Noto Serif',serif;font-size:16px;font-weight:700;color:var(--navy);margin-bottom:3px}
.center-tag{font-size:11px;font-weight:600;color:var(--text-mid);margin-bottom:2px}
.center-row{display:flex;gap:24px;margin:6px 0;flex-wrap:wrap}
.center-field{font-size:11px;color:var(--text-mid)}
.center-field span{font-weight:600;color:var(--text)}
.center-divider{border:none;border-top:1px solid var(--border-lt);margin:8px 0}
.center-highlight{font-size:12px;font-weight:700;color:var(--navy);margin:4px 0}
.center-print{font-size:10px;color:var(--blue);text-decoration:none;display:block;margin-top:8px;text-align:center}
.center-copy{font-size:9.5px;color:var(--text-lt);text-align:center;margin-top:4px}

/* ── LEGEND ── */
.legend{display:flex;gap:12px;flex-wrap:wrap;margin-top:10px;font-size:10.5px;color:#555;padding-left:2px}
.legend-item{display:flex;align-items:center;gap:4px}
.legend-dot{width:8px;height:8px;border-radius:50%;display:inline-block}

/* ── STAR COLORS ── */
.sc-kim{color:#8B6914}
.sc-moc{color:#1B6B2B}
.sc-thuy{color:#1A4E8C}
.sc-hoa{color:#B82020}
.sc-tho{color:#6B3E1A}
.sc-sat{color:#CC0000;font-weight:600}
.sc-loc{color:#8B6914;font-weight:600}
.sc-cat{color:#1A4E8C}
.sc-hoa-loc{color:#1B6B2B;font-weight:700}
.sc-hoa-quyen{color:#7B3FA0;font-weight:700}
.sc-hoa-khoa{color:#1A4E8C;font-weight:700}
.sc-hoa-ky{color:#CC0000;font-weight:700}
.sc-neutral{color:#333}

/* ── PRINT ── */
@media print{
  .topnav,.form-wrap,.btn-anlaso,.grid-section-title,.legend{display:none!important}
  .grid-wrap{margin:0;padding:0;max-width:100%}
  .laso-grid{border:1.5px solid #000}
  .cung-cell,.cell-center{border:1px solid #666}
}

/* ── RESPONSIVE ── */
@media(max-width:700px){
  .topnav{padding:0 12px}
  .laso-grid{font-size:85%}
  .cung-cell{min-height:120px;padding:5px}
}

/* ── LOADING ── */
.loading-msg{text-align:center;padding:40px;color:var(--text-lt);font-size:14px}
.error-msg{text-align:center;padding:20px;color:var(--red);font-size:13px;background:#fff9f9;border:1px solid #fcc;border-radius:6px}
</style>
</head>
<body>

<!-- NAV -->
<nav class="topnav">
  <a class="nav-logo" href="/">
    <img src="/seal.webp" alt="Tử Vi Minh Bảo">
    <div><div class="name">Tử Vi Minh Bảo</div></div>
  </a>
  <div class="nav-links">
    <a class="nav-link" href="/">Trang Chủ</a>
    <a class="nav-link" href="/la-so.html">Lá Số</a>
    <a class="nav-link" href="/about.html">Giới Thiệu</a>
    <a class="nav-link" href="/blog.html">Vấn Đáp</a>
  </div>
</nav>

<!-- FORM -->
<div class="form-wrap">
  <div class="form-card">
    <div class="form-title">An Sao Lá Số Tử Vi</div>
    <div class="form-row">
      <div class="form-group fg-name">
        <label>Họ và Tên</label>
        <input type="text" id="inp-name" placeholder="Nguyễn Văn A" value="">
      </div>
      <div class="form-group fg-gender">
        <label>Giới Tính</label>
        <select id="inp-gender">
          <option value="nam">Nam</option>
          <option value="nu">Nữ</option>
        </select>
      </div>
      <div class="form-group fg-namxem">
        <label>Năm Xem</label>
        <input type="number" id="inp-namxem" value="2026" min="1900" max="2100">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group fg-dd">
        <label>Ngày (DL)</label>
        <select id="inp-dd"></select>
      </div>
      <div class="form-group fg-mm">
        <label>Tháng (DL)</label>
        <select id="inp-mm"></select>
      </div>
      <div class="form-group" style="width:110px">
        <label>Năm (DL)</label>
        <input type="number" id="inp-yyyy" value="1990" min="1900" max="2099">
      </div>
      <div class="form-group fg-hh">
        <label>Giờ</label>
        <select id="inp-hh"></select>
      </div>
      <div class="form-group fg-pp">
        <label>Phút</label>
        <select id="inp-pp"></select>
      </div>
      <div class="gio-info" id="gio-chi-display">Giờ âm: —</div>
      <button class="btn-anlaso" id="btn-anlaso" onclick="doAnSao()">Lấy Lá Số</button>
    </div>
  </div>
</div>

<!-- GRID OUTPUT -->
<div class="grid-wrap" id="grid-wrap" style="display:none">
  <div class="grid-section-title" id="grid-title"></div>
  <div id="laso-grid-container"></div>
  <div class="legend">
    <strong style="color:#555">Ngũ Hành:</strong>
    <span class="legend-item"><span class="legend-dot" style="background:#B82020"></span><span class="sc-hoa">Hỏa</span></span>
    <span class="legend-item"><span class="legend-dot" style="background:#1B6B2B"></span><span class="sc-moc">Mộc</span></span>
    <span class="legend-item"><span class="legend-dot" style="background:#1A4E8C"></span><span class="sc-thuy">Thủy</span></span>
    <span class="legend-item"><span class="legend-dot" style="background:#8B6914"></span><span class="sc-kim">Kim</span></span>
    <span class="legend-item"><span class="legend-dot" style="background:#6B3E1A"></span><span class="sc-tho">Thổ</span></span>
    &nbsp;&nbsp;
    <strong style="color:#555">Độ Sáng:</strong>
    <span>(M)Miếu &nbsp;(V)Vượng &nbsp;(Đ)Đắc &nbsp;(B)Bình &nbsp;(H)Hãm</span>
  </div>
</div>

<script src="/tuvi-ansao-engine.js"></script>
<script>
// ── Constants ─────────────────────────────────────────────────
const CAN  = ['Giáp','Ất','Bính','Đinh','Mậu','Kỷ','Canh','Tân','Nhâm','Quý'];
const CHI  = ['Tý','Sửu','Dần','Mão','Thìn','Tỵ','Ngọ','Mùi','Thân','Dậu','Tuất','Hợi'];
const CHI_SHORT = ['Tý','Sửu','Dần','Mão','Thìn','Tỵ','Ngọ','Mùi','Thân','Dậu','Tuất','Hợi'];

// Grid layout: grid[row][col] = diaChiIndex (-1 = center)
const GRID_DC = [
  [5, 6, 7, 8],
  [4,-1,-1, 9],
  [3,-1,-1,10],
  [2, 1, 0,11],
];

// Outer edge position for each grid cell
