<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xác nhận thanh toán — Tử Vi Minh Bảo</title>
<meta name="robots" content="noindex">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;600&family=Be+Vietnam+Pro:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Be Vietnam Pro', sans-serif;
    background: #fdf6e9;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    background: #fff;
    border: 1px solid #d4c4a0;
    border-radius: 12px;
    padding: 48px 40px;
    max-width: 440px;
    width: 100%;
    text-align: center;
  }
  .icon { font-size: 56px; margin-bottom: 20px; }
  .title {
    font-family: 'Noto Serif', serif;
    font-size: 24px;
    color: #061A2E;
    margin-bottom: 10px;
  }
  .subtitle { font-size: 14px; color: #777; line-height: 1.6; margin-bottom: 28px; }
  .spinner {
    width: 32px; height: 32px;
    border: 3px solid #e0e0e0;
    border-top-color: #061A2E;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .btn {
    display: inline-block;
    padding: 12px 28px;
    background: #061A2E;
    color: #fff;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    text-decoration: none;
    font-family: inherit;
    transition: background 0.15s;
  }
  .btn:hover { background: #1455A4; }
  .btn-gold { background: #c9a84c; color: #061A2E; }
  .btn-gold:hover { background: #f0d080; }
  .status { font-size: 13px; color: #888; margin-top: 12px; }
</style>
</head>
<body>
<div class="card" id="card">
  <div class="spinner" id="spinner"></div>
  <div class="title">Đang xác nhận thanh toán...</div>
  <div class="subtitle" id="msg">Vui lòng chờ trong giây lát</div>
</div>

<script src="/auth.js"></script>
<script>
const params = new URLSearchParams(window.location.search);
const slug    = params.get('slug');
const token   = params.get('token');   // PayPal order token
const payerId = params.get('PayerID'); // PayPal payer ID

async function capture() {
  const card = document.getElementById('card');

  // Debug: log tất cả URL params
  console.log('[payment-success] params:', Object.fromEntries(params));
  console.log('[payment-success] token:', token, 'slug:', slug);

  if (!token || !slug) {
    // Fallback: PayPal đôi khi dùng 'orderID' thay vì 'token'
    const orderID = params.get('orderID') || params.get('order_id');
    if (orderID && slug) {
      console.log('[payment-success] Using orderID fallback:', orderID);
      // reassign token
      window._paypalToken = orderID;
    } else {
      showError('Thiếu thông tin thanh toán. URL params: ' + window.location.search);
      return;
    }
  }

  try {
    // Lấy user hiện tại nếu đã login
    let userId = null;
    if (window.supabaseClient) {
      const { data: { session } } = await window.supabaseClient.auth.getSession();
      userId = session?.user?.id || null;
    }

    // Capture payment
    const res = await fetch('/api/payment?action=capture', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ orderId: window._paypalToken || token, slug, userId }),
    });

    const data = await res.json();

    if (data.success) {
      showSuccess(slug);
    } else {
      showError(data.error || 'Thanh toán thất bại. Vui lòng liên hệ hỗ trợ.');
    }

  } catch (e) {
    showError('Lỗi kết nối. Vui lòng thử lại sau.');
  }
}

function getReturnUrl(slug) {
  // Detect product from slug prefix
  if (slug.startsWith('xem-tuoi-')) return '/xem-tuoi.html';
  if (slug.startsWith('xem-lam-an-')) return '/xem-lam-an.html';
  return '/luan-giai.html';  // default: lá số cá nhân
}

function getProductLabel(slug) {
  if (slug.startsWith('xem-tuoi-')) return 'Xem Tuổi Vợ Chồng';
  if (slug.startsWith('xem-lam-an-')) return 'Xem Tuổi Làm Ăn';
  return 'Luận Giải Lá Số';
}

function showSuccess(slug) {
  const returnUrl = getReturnUrl(slug);
  const label = getProductLabel(slug);
  const backUrl = `${returnUrl}?slug=${encodeURIComponent(slug)}&unlocked=1`;
  document.getElementById('card').innerHTML = `
    <div class="icon">✅</div>
    <div class="title">Thanh toán thành công!</div>
    <div class="subtitle">
      Luận giải đầy đủ đã được mở khóa.<br>
      Cảm ơn bạn đã tin dùng Tử Vi Minh Bảo.
    </div>
    <a href="${backUrl}" class="btn btn-gold">
      Xem luận giải ${label} →
    </a>
    <div class="status">Kết quả sẽ được khôi phục tự động khi bạn quay lại trang.</div>
  `;
  // Auto redirect after 2s
  setTimeout(() => { window.location.href = backUrl; }, 2000);
}

function showError(msg) {
  document.getElementById('card').innerHTML = `
    <div class="icon">❌</div>
    <div class="title">Có lỗi xảy ra</div>
    <div class="subtitle">${msg}</div>
    <a href="${getReturnUrl(slug||'')}?slug=${encodeURIComponent(slug || '')}" class="btn" style="margin-right:8px">
      ← Quay lại
    </a>
    <a href="/contact.html" class="btn btn-gold">Liên hệ hỗ trợ</a>
  `;
}

// Chờ auth.js init xong rồi mới capture
async function waitForAuth(timeout = 3000) {
  const start = Date.now();
  while (Date.now() - start < timeout) {
    if (window.supabaseClient) return;
    await new Promise(r => setTimeout(r, 100));
  }
}
waitForAuth().then(() => capture());
</script>
</body>
</html>
