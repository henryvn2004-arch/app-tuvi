<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,600;1,400&family=Be+Vietnam+Pro:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#061A2E;--blue:#1455A4;--gold:#9A7B3A;--gold-lt:#F9F4EB;--text:#1a1a1a;--text-mid:#444;--text-lt:#777;--border:#CCCCCC;--bg:#FFFFFF;--bg-soft:#F5F4F0}
body{font-family:'Be Vietnam Pro',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
.breadcrumb{background:var(--bg-soft);border-bottom:1px solid var(--border);padding:12px 40px;font-size:12px;color:var(--text-lt);display:flex;gap:8px;align-items:center}
.breadcrumb a{color:var(--text-lt);text-decoration:none}
.breadcrumb a:hover{color:var(--navy)}
.state-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:80px 20px;text-align:center}
.spinner{width:32px;height:32px;border:3px solid #e0e0e0;border-top-color:var(--navy);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.article-wrap{flex:1;max-width:760px;margin:0 auto;padding:48px 40px 80px;width:100%}
.book-meta{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:20px}
.meta-author{font-size:13px;color:var(--text-mid);font-weight:500}
.meta-lang{font-size:10px;padding:2px 8px;border-radius:99px;font-weight:600}
.lang-vi{background:#e8f4e8;color:#1a6b3a}
.lang-zh{background:#fde8d8;color:#8a1510}
.meta-tag{font-size:10px;background:var(--bg-soft);color:var(--text-lt);padding:2px 8px;border-radius:4px}
.book-title{font-family:'Noto Serif',serif;font-size:32px;color:var(--navy);font-weight:600;line-height:1.3;margin-bottom:12px}
.book-excerpt{font-size:16px;color:var(--text-lt);line-height:1.75;font-weight:300;font-style:italic;margin-bottom:28px;padding-bottom:28px;border-bottom:2px solid var(--border)}
.download-box{background:var(--gold-lt);border:1px solid #e0c878;border-radius:8px;padding:16px 20px;margin-bottom:32px;display:flex;align-items:center;justify-content:space-between;gap:16px}
.download-box.no-link{background:var(--bg-soft);border-color:var(--border)}
.dl-text{font-size:13px;color:var(--text-mid);line-height:1.6}
.dl-text strong{color:var(--navy)}
.btn-dl{padding:10px 22px;background:var(--navy);color:#fff;border:none;border-radius:4px;font-family:'Be Vietnam Pro',sans-serif;font-size:12px;font-weight:600;letter-spacing:1px;text-transform:uppercase;cursor:pointer;text-decoration:none;display:inline-block;white-space:nowrap;transition:background .2s}
.btn-dl:hover{background:#0d2d4a}
.btn-dl.disabled{background:#bbb;cursor:default}
.article-body{font-size:16px;line-height:1.9;color:var(--text-mid);font-weight:300}
.article-body h2{font-family:'Noto Serif',serif;color:var(--navy);font-weight:600;font-size:20px;margin:32px 0 12px;padding-top:20px;border-top:1px solid var(--border)}
.article-body h2:first-child{border-top:none;padding-top:0;margin-top:0}
.article-body p{margin-bottom:14px}
.article-body strong{color:var(--text);font-weight:600}
.article-body blockquote{border-left:3px solid var(--gold);padding:10px 16px;margin:16px 0;background:var(--gold-lt);font-style:italic;border-radius:0 6px 6px 0}
.article-back{margin-top:48px;padding-top:24px;border-top:1px solid var(--border)}
.article-back a{font-size:13px;color:var(--blue);text-decoration:none}
.article-back a:hover{color:var(--navy)}
@media(max-width:700px){
  .topnav{padding:0 16px}
  .breadcrumb,.article-wrap{padding-left:16px;padding-right:16px}
  .book-title{font-size:24px}
  .download-box{flex-direction:column;align-items:flex-start}
}
</style>
</head>
<body>
<script src="/auth.js"></script>
<script src="/nav.js"></script>


<div class="breadcrumb">
  <a href="/">Trang Chủ</a>
  <span>›</span>
  <a href="/resources.html">Tài Liệu</a>
  <span>›</span>
  <span id="bc-title">Đang tải...</span>
</div>

<div id="state-loading" class="state-wrap">
  <div><div class="spinner"></div><div style="font-size:14px;color:#aaa">Đang tải...</div></div>
</div>

<div id="state-error" class="state-wrap" style="display:none">
  <div>
    <div style="font-size:40px;margin-bottom:16px">📚</div>
    <div style="font-family:'Noto Serif',serif;font-size:22px;color:var(--navy);margin-bottom:10px">Không tìm thấy tài liệu</div>
    <div style="font-size:14px;color:var(--text-lt);margin-bottom:24px">Tài liệu không tồn tại hoặc đang được cập nhật.</div>
    <a href="/resources.html" style="padding:10px 24px;background:var(--navy);color:#fff;border-radius:6px;font-size:13px;text-decoration:none">← Về Thư Viện</a>
  </div>
</div>

<article class="article-wrap" id="article" style="display:none">
  <div class="book-meta" id="book-meta"></div>
  <h1 class="book-title" id="book-title"></h1>
  <p class="book-excerpt" id="book-excerpt"></p>
  <div class="download-box" id="download-box">
    <div class="dl-text" id="dl-text"></div>
    <a id="dl-btn" class="btn-dl disabled" href="#" target="_blank" rel="noopener">Tải xuống</a>
  </div>
  <div class="article-body" id="article-body"></div>
  <div class="article-back">
    <a href="/resources.html">← Về Thư Viện Tài Liệu</a>
  </div>
</article>


<script>
const SB_URL = 'https://dciwkfdqhhddeymlisey.supabase.co';
const SB_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRjaXdrZmRxaGhkZGV5bWxpc2V5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMzQ2MzksImV4cCI6MjA4ODgxMDYzOX0._3aXoe0hO-46J1gASUiNv__tWjSzLZFTL0M3-47L26I';

function getSlug() {
  const parts = window.location.pathname.split('/').filter(Boolean);
  return parts[parts.length - 1] || '';
}

function renderMarkdown(text) {
  if (!text) return '';
  return text
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^### (.+)$/gm, '<h3 style="font-size:17px;font-weight:600;color:var(--text);margin:20px 0 8px">$1</h3>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>')
    .split('\n\n')
    .map(p => {
      p = p.trim();
      if (!p) return '';
      if (p.startsWith('<h') || p.startsWith('<blockquote')) return p;
      return `<p>${p.replace(/\n/g,'<br>')}</p>`;
    })
    .join('\n');
}

function updateSEO(book) {
  const url = `https://www.tuviminhbao.com/tai-lieu/sach/${book.slug}`;
  const title = `${book.title} — ${book.author} | Tử Vi Minh Bảo`;
  document.title = title;
  document.querySelector('meta[name="description"]')?.setAttribute('content', book.excerpt || book.title);
  document.querySelector('meta[property="og:title"]')?.setAttribute('content', title);
  document.querySelector('meta[property="og:description"]')?.setAttribute('content', book.excerpt || '');
  document.querySelector('link[rel="canonical"]')?.setAttribute('href', url);

  // JSON-LD Book + FAQPage
  const qaMatches = (book.content || '').match(/\*\*(.+?)\*\*\n\n([^*]+?)(?=\n\n\*\*|$)/gs) || [];
  const faqItems = qaMatches.map(m => {
    const lines = m.split('\n\n');
    const q = lines[0].replace(/\*\*/g,'').trim();
    const a = lines.slice(1).join(' ').trim();
    return { '@type': 'Question', name: q, acceptedAnswer: { '@type': 'Answer', text: a } };
  });

  const ld = [
    {
      '@context': 'https://schema.org',
      '@type': 'Book',
      name: book.title,
      author: { '@type': 'Person', name: book.author },
      inLanguage: book.language === 'vi' ? 'vi' : 'zh',
      description: book.excerpt || '',
      url,
      publisher: { '@type': 'Organization', name: 'Tử Vi Minh Bảo', url: 'https://www.tuviminhbao.com' },
    },
    ...(faqItems.length ? [{
      '@context': 'https://schema.org',
      '@type': 'FAQPage',
      mainEntity: faqItems,
    }] : []),
  ];

  ld.forEach((schema, i) => {
    let s = document.querySelector(`script[data-ld="${i}"]`);
    if (!s) { s = document.createElement('script'); s.type = 'application/ld+json'; s.setAttribute('data-ld', i); document.head.appendChild(s); }
    s.textContent = JSON.stringify(schema);
  });
}

async function load() {
  const slug = getSlug();
  if (!slug || slug === 'sach') { window.location.href = '/resources.html'; return; }

  try {
    const res = await fetch(
      `${SB_URL}/rest/v1/sach_library?slug=eq.${encodeURIComponent(slug)}&select=*&limit=1`,
      { headers: { apikey: SB_ANON, Authorization: `Bearer ${SB_ANON}` } }
    );
    const rows = await res.json();
    if (!rows?.length) { showError(); return; }
    render(rows[0]);
  } catch(e) { showError(); }
}

function showError() {
  document.getElementById('state-loading').style.display = 'none';
  document.getElementById('state-error').style.display = 'flex';
}

function render(book) {
  document.getElementById('state-loading').style.display = 'none';
  document.getElementById('article').style.display = 'block';

  document.getElementById('bc-title').textContent = book.title;

  // Meta badges
  const langLabel = book.language === 'vi' ? 'Tiếng Việt' : 'Tiếng Trung';
  const langCls   = book.language === 'vi' ? 'lang-vi' : 'lang-zh';
  document.getElementById('book-meta').innerHTML = `
    <span class="meta-author">✍ ${book.author || 'Không rõ tác giả'}</span>
    <span class="meta-lang ${langCls}">${langLabel}</span>
    ${(book.tags||[]).slice(0,3).map(t=>`<span class="meta-tag">${t}</span>`).join('')}
  `;

  document.getElementById('book-title').textContent = book.title;

  if (book.excerpt) {
    document.getElementById('book-excerpt').textContent = book.excerpt;
  } else {
    document.getElementById('book-excerpt').style.display = 'none';
  }

  // Download box
  const dlBox = document.getElementById('download-box');
  const dlBtn = document.getElementById('dl-btn');
  const dlTxt = document.getElementById('dl-text');
  if (book.drive_url) {
    dlBox.classList.remove('no-link');
    dlTxt.innerHTML = `<strong>📥 Tải xuống miễn phí</strong><br>File PDF — chia sẻ cho cộng đồng nghiên cứu Tử Vi.`;
    dlBtn.href = book.drive_url;
    dlBtn.classList.remove('disabled');
    dlBtn.textContent = '⬇ Tải xuống';
  } else {
    dlBox.classList.add('no-link');
    dlTxt.innerHTML = `<strong>🔜 Chưa có link tải xuống</strong><br>Tài liệu đang được cập nhật. Quay lại sau hoặc liên hệ để yêu cầu.`;
    dlBtn.onclick = (e) => e.preventDefault();
  }

  document.getElementById('article-body').innerHTML = renderMarkdown(book.content || '');
  updateSEO(book);
}

load();
</script>
<script src="/testimonials.js"></script>
<script src="/related-tools.js"></script>
</body>
</html>
