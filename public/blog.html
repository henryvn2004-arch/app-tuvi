<meta property="og:description" content="Giải đáp các câu hỏi về hôn nhân, tài chính, sự nghiệp theo quan điểm Tử Vi Đẩu Số cổ pháp.">

<link rel="apple-touch-icon" href="/seal.webp">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --navy: #061A2E; --blue: #1455A4; --gold: #9A7B3A; --gold-lt: #F9F4EB;
  --text: #1a1a1a; --text-mid: #444; --text-lt: #777;
  --border: #CCCCCC; --bg: #FFFFFF; --bg-soft: #F5F4F0;
}
body { font-family: 'Be Vietnam Pro', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }

.topnav { position: sticky; top: 0; z-index: 200; background: var(--navy); display: flex; align-items: center; height: 60px; padding: 0 40px; gap: 32px; }
.nav-logo { display:flex; align-items:center; gap:10px; text-decoration:none; }
.nav-logo img { width:38px; height:38px; object-fit:contain; border-radius:5px; }
.nav-logo .name { font-size:16px; font-weight:700; color:#CC2200; font-family:Georgia,serif; }
.nav-logo .url  { font-size:10px; color:#aaa; letter-spacing:0.07em; text-transform:uppercase; }
.nav-links { display: flex; align-items: center; gap: 4px; }
.nav-link { color: #8BAACC; font-size: 13px; text-decoration: none; padding: 6px 12px; border-radius: 6px; transition: all 0.15s; }
.nav-link:hover { color: #fff; background: rgba(255,255,255,0.07); }
.nav-link.active { color: #c9a84c; }
.nav-hamburger { display: none; background: none; border: none; color: #8BAACC; cursor: pointer; padding: 8px; font-size: 20px; }

/* HERO — khác với Tài Liệu: tone đậm hơn, editorial */
.hero { background: var(--navy); padding: 56px 40px 44px; position: relative; overflow: hidden; }
.hero::before { content: '問'; position: absolute; font-family: 'Noto Serif SC', serif; font-size: 300px; color: rgba(255,255,255,0.025); top: 50%; right: 5%; transform: translateY(-50%); pointer-events: none; }
.hero-eyebrow { font-size: 11px; letter-spacing: 4px; color: #c9a84c; text-transform: uppercase; margin-bottom: 12px; opacity:0; animation: fadeUp 0.6s ease 0.1s forwards; }
.hero-title { font-family: 'Noto Serif', serif; font-size: 38px; color: #fff; font-weight: 400; margin-bottom: 10px; opacity:0; animation: fadeUp 0.6s ease 0.2s forwards; }
.hero-sub { font-size: 14px; color: #8BAACC; font-weight: 300; line-height: 1.7; max-width: 560px; opacity:0; animation: fadeUp 0.6s ease 0.3s forwards; }

/* FEATURED — bài nổi bật đầu trang, to hơn */
.featured-wrap { background: var(--bg-soft); border-bottom: 1px solid var(--border); padding: 28px 40px; }
.featured-label { font-size: 10px; font-weight: 600; letter-spacing: 3px; color: var(--gold); text-transform: uppercase; margin-bottom: 14px; }
.featured-grid { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 16px; }
.featured-card {
  background: #fff; border: 1px solid var(--border); border-radius: 10px;
  padding: 22px; text-decoration: none; color: inherit;
  display: flex; flex-direction: column; gap: 8px;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.featured-card:hover { border-color: var(--navy); box-shadow: 0 4px 16px rgba(6,26,46,0.08); }
.featured-card.main { border-top: 3px solid var(--gold); }
.fc-cat { font-size: 10px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: var(--gold); }
.fc-title { font-family: 'Noto Serif', serif; font-size: 18px; color: var(--navy); line-height: 1.45; font-weight: 600; }
.featured-card.main .fc-title { font-size: 22px; }
.fc-excerpt { font-size: 13px; color: var(--text-lt); line-height: 1.65; font-weight: 300; }
.fc-meta { font-size: 11px; color: var(--text-lt); margin-top: auto; padding-top: 8px; border-top: 1px solid var(--border); }

/* CONTROLS */
.controls { background: #fff; border-bottom: 1px solid var(--border); padding: 14px 40px; display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
.search-input { flex: 1; min-width: 200px; max-width: 360px; padding: 8px 14px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; font-family: inherit; outline: none; transition: border-color 0.15s; }
.search-input:focus { border-color: var(--navy); }
.filter-select { padding: 8px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; font-family: inherit; background: #fff; outline: none; cursor: pointer; }
.count-badge { margin-left: auto; font-size: 12px; color: var(--text-lt); }

.cat-strip { padding: 12px 40px; border-bottom: 1px solid var(--border); display: flex; gap: 8px; flex-wrap: wrap; }
.cat-btn { padding: 5px 14px; border: 1px solid var(--border); border-radius: 20px; font-size: 12px; cursor: pointer; background: #fff; font-family: inherit; transition: all 0.15s; color: var(--text-mid); }
.cat-btn:hover, .cat-btn.active { background: var(--navy); color: #fff; border-color: var(--navy); }

/* MAIN GRID — editorial list style */
.page-body { flex: 1; max-width: 860px; margin: 0 auto; padding: 36px 40px 72px; width: 100%; }

.article-list { list-style: none; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
.article-item { border-bottom: 1px solid var(--border); transition: background .12s; }
.article-item:last-child { border-bottom: none; }
.article-item:hover { background: var(--bg-soft); }
.article-link { display: flex; align-items: baseline; justify-content: space-between; padding: 13px 18px; text-decoration: none; color: inherit; gap: 16px; }
.article-left { display: flex; align-items: baseline; gap: 12px; flex: 1; min-width: 0; }
.card-cat { font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--gold); white-space: nowrap; flex-shrink: 0; }
.card-title { font-size: 14px; color: var(--navy); line-height: 1.5; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.article-link:hover .card-title { color: var(--blue); text-decoration: underline; }
.card-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.card-tag { font-size: 10px; background: var(--bg-soft); color: var(--text-lt); padding: 2px 8px; border-radius: 4px; }
.card-date { font-size: 11px; color: var(--text-lt); white-space: nowrap; }
@media(max-width:700px){.card-cat{display:none}.card-tag{display:none}}

.state-empty { text-align: center; padding: 80px 20px; }
.state-loading { text-align: center; padding: 60px 20px; }
.spinner { width: 32px; height: 32px; border: 3px solid #e0e0e0; border-top-color: var(--navy); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }

.pagination { display: flex; justify-content: center; gap: 8px; margin-top: 40px; }
.page-btn { padding: 7px 14px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; cursor: pointer; background: #fff; color: var(--text); font-family: inherit; transition: all 0.15s; }
.page-btn:hover { border-color: var(--navy); color: var(--navy); }
.page-btn.active { background: var(--navy); color: #fff; border-color: var(--navy); }
.page-btn:disabled { opacity: 0.4; cursor: default; }

.site-footer { background:#1A1210; color:rgba(255,255,255,0.5); padding:36px 32px 24px; }
.footer-top  { display:flex; justify-content:space-between; align-items:flex-start; gap:32px; flex-wrap:wrap; padding-bottom:24px; border-bottom:1px solid rgba(255,255,255,0.08); margin-bottom:20px; }
.footer-brand { display:flex; align-items:center; gap:10px; }
.footer-brand img { width:36px; height:36px; object-fit:contain; border-radius:5px; opacity:0.9; }
.footer-brand-text .name { font-size:14px; font-weight:700; color:rgba(255,255,255,0.85); font-family:Georgia,serif; }
.footer-brand-text .zh   { font-size:12px; color:#C9A84C; }
.footer-tagline { font-size:12px; margin-top:8px; color:rgba(255,255,255,0.35); line-height:1.6; }
.footer-bottom  { display:flex; justify-content:space-between; align-items:center; font-size:11px; color:rgba(255,255,255,0.25); }
.footer-bottom img { width:20px; height:20px; object-fit:contain; opacity:0.3; border-radius:3px; }

@keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
@keyframes spin { to { transform:rotate(360deg); } }

@media (max-width:900px) { .featured-grid { grid-template-columns: 1fr 1fr; } }
@media (max-width:700px) {
  .topnav { padding: 0 16px; }
  .nav-links { display:none; position:absolute; top:60px; left:0; right:0; background:var(--navy); flex-direction:column; padding:8px 0 16px; border-bottom:1px solid #1a2a3a; }
  .nav-links.open { display:flex; }
  .nav-link { padding:10px 24px; border-radius:0; width:100%; }
  .nav-hamburger { display:block; margin-left:auto; }
  .hero { padding: 40px 20px 32px; }
  .featured-wrap { padding: 20px 16px; }
  .featured-grid { grid-template-columns: 1fr; }
  .controls, .cat-strip { padding: 12px 16px; }
  .page-body { padding: 24px 16px 48px; }
}
</style>
<script src="/share.js"></script>
<script src="/auth.js"></script>
</head>
<body>

<div class="hero">
  <div class="hero-eyebrow">考論 · Vấn Đáp</div>
  <div class="hero-title">Vấn Đáp Tử Vi</div>
  <div class="hero-sub">Các vấn đề học thuật, tranh biện và ứng dụng Tử Vi Đẩu Số trong bối cảnh hiện đại — nhìn từ kinh điển, đối chiếu thực chứng.</div>
</div>

<!-- Featured section — hiện khi có data -->
<div class="featured-wrap" id="featured-wrap" style="display:none">
  <div class="featured-label">Bài nổi bật</div>
  <div class="featured-grid" id="featured-grid"></div>
</div>

<div id="share-page-bar" style="padding:10px 40px;background:#f8f9fa;border-bottom:1px solid #eee"></div>
<div class="controls">
  <input class="search-input" type="text" id="search-input" placeholder="Tìm khảo luận..." oninput="filterArticles()">
  <select class="filter-select" id="filter-cat" onchange="filterArticles()">
    <option value="">Tất cả chủ đề</option>
    <option value="khao-luan">Vấn đáp</option>
    <option value="tranh-bien">Tranh biện</option>
    <option value="ung-dung">Ứng dụng</option>
    <option value="lich-su">Lịch sử</option>
    <option value="phuong-phap">Phương pháp</option>
  </select>
  <div class="count-badge" id="count-badge">Đang tải...</div>
</div>

<div class="cat-strip">
  <button class="cat-btn active" onclick="setCategory('', this)">Tất cả</button>
  <button class="cat-btn" onclick="setCategory('khao-luan', this)">Vấn đáp</button>
  <button class="cat-btn" onclick="setCategory('tranh-bien', this)">Tranh biện</button>
  <button class="cat-btn" onclick="setCategory('ung-dung', this)">Ứng dụng</button>
  <button class="cat-btn" onclick="setCategory('lich-su', this)">Lịch sử</button>
  <button class="cat-btn" onclick="setCategory('phuong-phap', this)">Phương pháp</button>
</div>

<div class="page-body">
  <div id="state-loading" class="state-loading">
    <div class="spinner"></div>
    <div style="font-size:14px;color:#aaa">Đang tải khảo luận...</div>
  </div>
  <div id="state-empty" class="state-empty" style="display:none">
    <div style="font-size:48px;margin-bottom:16px">✍</div>
    <div style="font-family:'Noto Serif',serif;font-size:20px;color:var(--navy);margin-bottom:8px">Chưa có bài khảo luận</div>
    <div style="font-size:14px;color:var(--text-lt)">Các bài khảo luận đang được biên soạn. Hãy quay lại sớm.</div>
  </div>
  <div id="article-grid" class="article-grid"></div>
  <div id="pagination" class="pagination"></div>
</div>

<script>
const SUPABASE_URL = 'https://dciwkfdqhhddeymlisey.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRjaXdrZmRxaGhkZGV5bWxpc2V5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMzQ2MzksImV4cCI6MjA4ODgxMDYzOX0._3aXoe0hO-46J1gASUiNv__tWjSzLZFTL0M3-47L26I';
const PAGE_SIZE = 24;
const CAT_LABEL = { 'khao-luan':'Vấn đáp', 'tranh-bien':'Tranh biện', 'ung-dung':'Ứng dụng', 'lich-su':'Lịch sử', 'phuong-phap':'Phương pháp' };

let allData = [], filtered = [], currentPage = 1, currentCat = '';

async function loadAll() {
  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/khao_luan?select=id,slug,title,excerpt,category,tags,featured,created_at&order=created_at.desc&limit=1000`,
      { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }
    );
    if (!res.ok) throw new Error();
    allData = await res.json();

    // Featured
    const featured = allData.filter(d => d.featured).slice(0, 3);
    if (featured.length > 0) renderFeatured(featured);

    filtered = [...allData];
    render();
  } catch(e) {
    document.getElementById('state-loading').style.display = 'none';
    document.getElementById('state-empty').style.display = 'block';
    document.getElementById('count-badge').textContent = '0 bài';
  }
}

function renderFeatured(items) {
  const wrap = document.getElementById('featured-wrap');
  const grid = document.getElementById('featured-grid');
  wrap.style.display = 'block';
  grid.innerHTML = items.map((d, i) => {
    const cat = CAT_LABEL[d.category] || d.category || '';
    const date = d.created_at ? new Date(d.created_at).toLocaleDateString('vi-VN') : '';
    return `<a class="featured-card${i===0?' main':''}" href="/khao-luan/${d.slug||d.id}">
      <div class="fc-cat">${cat}</div>
      <div class="fc-title">${d.title||'—'}</div>
      ${d.excerpt ? `<div class="fc-excerpt">${d.excerpt}</div>` : ''}
      <div class="fc-meta">${date}</div>
    </a>`;
  }).join('');
}

function setCategory(cat, btn) {
  currentCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('filter-cat').value = cat;
  filterArticles();
}

function filterArticles() {
  const q   = document.getElementById('search-input').value.toLowerCase();
  const cat = document.getElementById('filter-cat').value || currentCat;
  filtered = allData.filter(d => {
    if (cat && d.category !== cat) return false;
    if (q) {
      const hay = [d.title, d.excerpt, d.category, ...(d.tags||[])].join(' ').toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
  currentPage = 1;
  render();
}

function render() {
  document.getElementById('state-loading').style.display = 'none';
  const grid  = document.getElementById('article-grid');
  const total = filtered.length;
  document.getElementById('count-badge').textContent = `${total} bài`;

  if (total === 0) {
    grid.innerHTML = '';
    document.getElementById('state-empty').style.display = 'block';
    document.getElementById('pagination').innerHTML = '';
    return;
  }
  document.getElementById('state-empty').style.display = 'none';

  const start = (currentPage - 1) * PAGE_SIZE;
  const page  = filtered.slice(start, start + PAGE_SIZE);

  grid.innerHTML = '<ul class="article-list">' + page.map((d) => {
    const cat  = CAT_LABEL[d.category] || d.category || '';
    const date = d.created_at ? new Date(d.created_at).toLocaleDateString('vi-VN',{year:'numeric',month:'short',day:'numeric'}) : '';
    const tag  = (d.tags||[])[0] ? `<span class="card-tag">${(d.tags||[])[0]}</span>` : '';
    return `<li class="article-item">
      <a class="article-link" href="/khao-luan/${d.slug||d.id}">
        <div class="article-left">
          ${cat ? `<span class="card-cat">${cat}</span>` : ''}
          <span class="card-title">${d.title||'—'}</span>
        </div>
        <div class="card-right">${tag}<span class="card-date">${date}</span></div>
      </a>
    </li>`;
  }).join('') + '</ul>';

  const totalPages = Math.ceil(total / PAGE_SIZE);
  const pag = document.getElementById('pagination');
  if (totalPages <= 1) { pag.innerHTML = ''; return; }
  let btns = `<button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>←</button>`;
  for (let p = 1; p <= totalPages; p++) {
    if (p===1||p===totalPages||Math.abs(p-currentPage)<=1)
      btns += `<button class="page-btn ${p===currentPage?'active':''}" onclick="goPage(${p})">${p}</button>`;
    else if (Math.abs(p-currentPage)===2)
      btns += `<span style="padding:7px 4px;color:#aaa">…</span>`;
  }
  btns += `<button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage===totalPages?'disabled':''}>→</button>`;
  pag.innerHTML = btns;
}

function goPage(p) { currentPage = p; render(); window.scrollTo({top:0,behavior:'smooth'}); }

loadAll();
if (window.ShareButtons) {
  ShareButtons.render('share-page-bar', {
    url: window.location.href,
    title: document.title,
    text: 'Tử Vi Minh Bảo — ' + document.title
  });
}
</script>
<script src="/nav.js"></script>
<script src="/footer.js"></script>
</body>
</html>
